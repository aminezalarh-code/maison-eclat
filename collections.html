<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop the Collection | Stainless Steel Jewelry - Belorya</title>
  <meta name="description" content="Browse the full Belorya collection of acier inoxydable jewellery: necklaces, matching sets (parures) and earrings. Filter and sort to find your piece." />
  <meta name="theme-color" content="#0a0a0b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body data-page="collections">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="wrap">
        <div class="breadcrumb" data-reveal><a href="index.html">Home</a><span>/</span><span>Collections</span></div>
        <h1 data-reveal data-delay="1">The <em>Collection</em></h1>
        <p data-reveal data-delay="2">Refined stainless-steel jewellery in acier inoxydable, every piece finished by hand and made for everyday wear.</p>
      </div>
    </section>

    <section class="wrap">
      <div class="toolbar">
        <div class="filters" id="filters"></div>
        <div style="display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap">
          <span class="results-count" id="resultsCount"></span>
          <div class="sort">
            <label for="sortSelect">Sort</label>
            <select id="sortSelect">
              <option value="featured">Featured</option>
              <option value="new">Newest</option>
              <option value="best">Best Sellers</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="section wrap" style="padding-top:2.5rem">
      <div class="product-grid" id="collection-grid"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
