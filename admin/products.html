<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produits — BELORYA Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=2" />
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=2"></script>
  <script src="lib.js?v=2"></script>
  <script>
    (async () => {
      const user = await Admin.requireAdmin(); if (!user) return;
      const db = Admin.db(); const { money, esc, el } = Admin;
      const LOW = 5;

      Admin.mountShell('products.html', 'Créations',
        `<a class="btn btn--gold" href="product-edit.html">+ Ajouter une création</a>`,
        `<div class="toolbar">
           <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
             <input id="q" placeholder="Rechercher une création…" /></div>
           <select class="select" id="fCat" style="max-width:180px"><option value="">Toutes les collections</option></select>
           <select class="select" id="fStatus" style="max-width:170px">
             <option value="">Tous statuts</option><option value="active">Actif</option>
             <option value="draft">Brouillon</option><option value="out_of_stock">Rupture</option>
             <option value="archived">Archivé</option></select>
         </div>
         <div class="card"><div class="tbl-wrap"><table class="tbl">
           <thead><tr><th>Création</th><th>Collection</th><th>Prix</th><th>Stock</th><th>Statut</th><th>Mise en avant</th><th class="right"></th></tr></thead>
           <tbody id="rows"><tr><td colspan="7"><div class="empty">Un instant…</div></td></tr></tbody>
         </table></div></div>`);

      const { data: cats } = await db.from('categories').select('id,slug,name_fr').order('display_order');
      const catMap = {}; (cats || []).forEach(c => catMap[c.id] = c.name_fr);
      el('fCat').insertAdjacentHTML('beforeend', (cats || []).map(c => `<option value="${c.id}">${esc(c.name_fr)}</option>`).join(''));

      let ALL = [];
      async function load() {
        const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
        if (error) { el('rows').innerHTML = `<tr><td colspan="7"><div class="empty">Erreur: ${esc(error.message)}</div></td></tr>`; return; }
        ALL = data || []; render();
      }

      const statusPill = (s, stock) => {
        if (s === 'archived') return `<span class="pill pill--muted">Archivé</span>`;
        if (s === 'draft') return `<span class="pill pill--muted">Brouillon</span>`;
        if (stock <= 0) return `<span class="pill pill--bad"><span class="dot"></span>Rupture</span>`;
        return `<span class="pill pill--ok"><span class="dot"></span>Actif</span>`;
      };
      const flags = (p) => [
        p.is_featured ? '<span class="pill pill--gold">Vedette</span>' : '',
        p.is_best_seller ? '<span class="pill pill--gold">Best</span>' : '',
        p.is_new ? '<span class="pill pill--gold">Nouveau</span>' : '',
        (p.sale_price ? `<span class="pill pill--gold">-${Math.round((1 - p.sale_price / p.price) * 100)}%</span>` : '')
      ].filter(Boolean).join(' ') || '<span class="muted">—</span>';

      function render() {
        const q = el('q').value.trim().toLowerCase();
        const fc = el('fCat').value, fs = el('fStatus').value;
        let list = ALL.filter(p =>
          (!q || (p.name || '').toLowerCase().includes(q) || (p.sku || '').toLowerCase().includes(q)) &&
          (!fc || p.category_id === fc) && (!fs || p.status === fs));
        if (!list.length) { el('rows').innerHTML = `<tr><td colspan="7"><div class="empty">Votre prochaine création mérite sa place ici.</div></td></tr>`; return; }
        el('rows').innerHTML = list.map(p => `<tr>
          <td><div style="display:flex;align-items:center;gap:12px">
            <img class="thumb" src="${esc(p.featured_image) || ''}" alt="" onerror="this.style.visibility='hidden'">
            <div><div class="tbl__name">${esc(p.name)}</div><div class="tbl__sub">${esc(p.sku) || ''}</div></div></div></td>
          <td>${esc(catMap[p.category_id]) || '<span class="muted">—</span>'}</td>
          <td>${p.sale_price ? `<span style="color:var(--gold-deep);font-weight:600">${money(p.sale_price)}</span> <s class="muted">${money(p.price)}</s>` : money(p.price)}</td>
          <td><span class="pill pill--${p.stock <= 0 ? 'bad' : (p.stock <= LOW ? 'warn' : 'muted')}">${p.stock}</span></td>
          <td>${statusPill(p.status, p.stock)}</td>
          <td>${flags(p)}</td>
          <td class="right" style="white-space:nowrap">
            <a class="btn btn--sm" href="product-edit.html?id=${p.id}">Modifier</a>
            <button class="btn btn--sm" data-arch="${p.id}" data-st="${p.status}">${p.status === 'archived' ? 'Restaurer' : 'Archiver'}</button>
            <button class="btn btn--sm btn--danger" data-del="${p.id}" data-name="${esc(p.name)}">✕</button>
          </td></tr>`).join('');

        el('rows').querySelectorAll('[data-arch]').forEach(b => b.onclick = async () => {
          const to = b.dataset.st === 'archived' ? 'active' : 'archived';
          const { error } = await db.from('products').update({ status: to }).eq('id', b.dataset.arch);
          if (error) return Admin.toast(error.message, 'bad');
          Admin.toast(to === 'archived' ? '✨ Création mise à l’écrin (archivée).' : '✨ Création restaurée dans votre collection.'); load();
        });
        el('rows').querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
          if (!confirm(`Retirer définitivement « ${b.dataset.name} » de votre maison ?`)) return;
          const { error } = await db.from('products').delete().eq('id', b.dataset.del);
          if (error) return Admin.toast(error.message, 'bad');
          Admin.toast('La création a été retirée.'); load();
        });
      }

      ['q', 'fCat', 'fStatus'].forEach(id => el(id).addEventListener('input', render));
      load();
    })();
  </script>
</body>
</html>
