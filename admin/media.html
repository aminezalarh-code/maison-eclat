<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médiathèque — BELORYA Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    .media-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:18px; margin-top:20px; }
    .mediac { border:1px solid var(--line); border-radius:14px; overflow:hidden; background:#fff; box-shadow: var(--shadow); transition: transform .3s ease, box-shadow .3s ease; animation: fadeUp .45s ease both; }
    .mediac:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
    .mediac img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:var(--line-2); }
    .mediac__bar { display:flex; gap:6px; padding:9px; }
    .mediac__bar .btn { flex:1; justify-content:center; }
    .drop { border:2px dashed var(--line); border-radius:14px; padding:34px; text-align:center; color:var(--muted); cursor:pointer; transition: border-color .3s ease, background .3s ease; font-family: var(--display); font-style: italic; font-size: 1.02rem; }
    .drop.drag { border-color:var(--gold); background:var(--gold-wash); }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="lib.js"></script>
  <script>
    (async () => {
      const user = await Admin.requireAdmin(); if (!user) return;
      const db = Admin.db(); const { esc, el, toast } = Admin;

      Admin.mountShell('media.html', 'Galerie',
        `<button class="btn btn--gold" id="pick">+ Ajouter des images</button>`,
        `<div class="drop" id="drop">Déposez vos images ici, ou cliquez pour les choisir</div>
         <input type="file" id="file" accept="image/*" multiple hidden>
         <div class="media-grid" id="grid"><div class="empty">Un instant…</div></div>`);

      async function load() {
        const { data, error } = await db.from('media').select('*').order('created_at', { ascending: false });
        if (error) { el('grid').innerHTML = `<div class="empty">${esc(error.message)}</div>`; return; }
        el('grid').innerHTML = (data && data.length) ? data.map(m => `
          <div class="mediac">
            <img src="${esc(m.url)}" loading="lazy" onerror="this.style.visibility='hidden'">
            <div class="mediac__bar">
              <button class="btn btn--sm" data-copy="${esc(m.url)}">Copier</button>
              <button class="btn btn--sm btn--danger" data-del="${m.id}" data-path="${esc(m.path)||''}">✕</button>
            </div></div>`).join('') : '<div class="empty">Votre galerie attend ses premières images.</div>';
        el('grid').querySelectorAll('[data-copy]').forEach(b => b.onclick = async () => {
          try { await navigator.clipboard.writeText(b.dataset.copy); toast('Lien copié'); } catch { toast('Copie impossible', 'bad'); }
        });
        el('grid').querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
          if (!confirm('Retirer cette image de la galerie ?')) return;
          if (b.dataset.path) await db.storage.from('media').remove([b.dataset.path]);
          await db.from('media').delete().eq('id', b.dataset.del); toast('L’image a été retirée.'); load();
        });
      }
      async function up(files) {
        const list = [...files].filter(f => f.type.startsWith('image/'));
        let ok = 0, lastErr = '';
        for (const f of list) { try { await Admin.upload(f, 'homepage'); ok++; } catch (e) { lastErr = e.message || String(e); } }
        if (ok && ok === list.length) toast('✨ Ajoutées à votre galerie.');
        else if (ok) toast(`${ok}/${list.length} ajoutée(s) — ${lastErr}`, 'bad');
        else if (list.length) toast('Échec du téléversement : ' + lastErr, 'bad');
        load();
      }
      const drop = el('drop'), file = el('file');
      el('pick').onclick = () => file.click();
      drop.onclick = () => file.click();
      file.onchange = () => { up(file.files); file.value = ''; };
      ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
      ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
      drop.addEventListener('drop', e => up(e.dataTransfer.files));
      load();
    })();
  </script>
</body>
</html>
