<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médiathèque — BELORYA Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    .media-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-top:16px; }
    .mediac { border:1px solid var(--line); border-radius:10px; overflow:hidden; background:#fff; }
    .mediac img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#f2f3f5; }
    .mediac__bar { display:flex; gap:6px; padding:7px; }
    .mediac__bar .btn { flex:1; justify-content:center; }
    .drop { border:2px dashed var(--line); border-radius:10px; padding:26px; text-align:center; color:var(--muted); cursor:pointer; transition:.2s; }
    .drop.drag { border-color:var(--gold); background:#fbf7ec; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="lib.js"></script>
  <script>
    (async () => {
      const user = await Admin.requireAdmin(); if (!user) return;
      const db = Admin.db(); const { esc, el, toast } = Admin;

      Admin.mountShell('media.html', 'Médiathèque',
        `<button class="btn btn--gold" id="pick">+ Téléverser</button>`,
        `<div class="drop" id="drop">Glissez-déposez des images ici, ou cliquez pour choisir</div>
         <input type="file" id="file" accept="image/*" multiple hidden>
         <div class="media-grid" id="grid"><div class="empty">Chargement…</div></div>`);

      async function load() {
        const { data, error } = await db.from('media').select('*').order('created_at', { ascending: false });
        if (error) { el('grid').innerHTML = `<div class="empty">${esc(error.message)}</div>`; return; }
        el('grid').innerHTML = (data && data.length) ? data.map(m => `
          <div class="mediac">
            <img src="${esc(m.url)}" loading="lazy" onerror="this.style.visibility='hidden'">
            <div class="mediac__bar">
              <button class="btn btn--sm" data-copy="${esc(m.url)}">Copier</button>
              <button class="btn btn--sm btn--danger" data-del="${m.id}" data-path="${esc(m.path)||''}">✕</button>
            </div></div>`).join('') : '<div class="empty">Aucun média. Téléversez des images.</div>';
        el('grid').querySelectorAll('[data-copy]').forEach(b => b.onclick = async () => {
          try { await navigator.clipboard.writeText(b.dataset.copy); toast('Lien copié'); } catch { toast('Copie impossible', 'bad'); }
        });
        el('grid').querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
          if (!confirm('Supprimer ce média ?')) return;
          if (b.dataset.path) await db.storage.from('media').remove([b.dataset.path]);
          await db.from('media').delete().eq('id', b.dataset.del); toast('Média supprimé'); load();
        });
      }
      async function up(files) {
        const list = [...files].filter(f => f.type.startsWith('image/'));
        for (const f of list) { try { await Admin.upload(f, 'homepage'); } catch (e) { toast(e.message || 'Échec', 'bad'); } }
        if (list.length) toast('Téléversé'); load();
      }
      const drop = el('drop'), file = el('file');
      el('pick').onclick = () => file.click();
      drop.onclick = () => file.click();
      file.onchange = () => { up(file.files); file.value = ''; };
      ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
      ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
      drop.addEventListener('drop', e => up(e.dataTransfer.files));
      load();
    })();
  </script>
</body>
</html>
